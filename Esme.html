<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lluvia Gigante de Amor</title>
    <style>
            body {
                  margin: 0;
                  background: black;
                  overflow: hidden;
                  cursor: none;
                  touch-action: manipulation;

        }

            canvas {
                  display: block;
                  position: absolute;
                  top: 0;
                  left: 0;

        }

            .overlay {
                  position: absolute;
                  top: 0;
                  left: 0;
                  width: 100%;
                  height: 100%;
                  z-index: 2;
                  display: flex;
                  flex-direction: column; /* Cambiado a columna para el temporizador */
                  align-items: center;
                  justify-content: center;
                  pointer-events: none;

        }

            .center-message {
                  font-family: 'Courier New', monospace;
                  color: #ff69b4; /* Rosa brillante */
                  font-size: 6rem;
                  text-align: center;
                  opacity: 0.8;
                  text-shadow: 0 0 10px rgba(255, 105, 180, 0.7);

        }

            .countdown-timer {
                  font-family: 'Courier New', monospace;
                  color: #ff007f; /* Rosa más oscuro */
                  font-size: 2rem;
                  text-align: center;
                  margin-top: 20px;
                  text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);

        }

            @media (max-width: 768px) {
                  .center-message

        {
                    font-size: 3rem;

        }

              .countdown-timer {
                    font-size: 1.2rem;

        }


        }

            .heart-cursor {
                  position: absolute;
                  width: 32px;
                  height: 32px;
                  z-index: 9999;
                  pointer-events: none;
                  transition: transform 0.1s ease;
                  filter: drop-shadow(0 0 4px #ff69b4);

        }

            #audio-control {
                  position: absolute;
                  opacity: 0;
                  z-index: -1;

        }
        /* Estilo para el botón que aparece al terminar la cuenta regresiva */
        .action-button {
            margin-top: 30px; /* Separación del texto de la cuenta regresiva */
            padding: 15px 30px;
            background-color: #ff007f; /* Color de fondo */
            color: white; /* Color del texto */
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            text-decoration: none; /* Elimina el subrayado del enlace */
            border-radius: 50px; /* Bordes redondeados para un estilo de "píldora" */
            border: 2px solid #ff69b4;
            transition: all 0.3s ease; /* Transición suave para el efecto hover */
            pointer-events: auto; /* Permite hacer clic en el botón */
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.7);
        }

            .action-button:hover {
                background-color: #ff69b4; /* Color al pasar el ratón por encima */
                transform: scale(1.1); /* Efecto de crecimiento al pasar el ratón */
            }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay">
        <div class="center-message">I LOVE YOU ESME💖</div>
        <div id="countdown" class="countdown-timer"></div>
    </div>
    <img id="cursor" class="heart-cursor" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cGF0aCBmaWxsPSIjZmY2OWI0IiBkPSJNNDcuNiAyNUMyNS4xIDI1IDcgNDMuMSA3IDY1LjZDNyA4OC4xIDI0LjMgMTI3IDkzLjUgMTU3LjVjNjkuMiAzMC41IDE0Ni4zIDY0LjEgMTYxLjUgODQuMSAxNS4yLTIwIDEwMC4xLTUzLjYgMTY5LjMtODQuMSA2OS4yLTMwLjUgODYuNS02OS40IDg2LjUtOTEuOSAwLTIyLjUtMTguMS00MC42LTQwLjYtNDAuNnMtNDAuNiAxOC4xLTQwLjYgNDAuNmMwIDguMSAxLjYgMTUuNSA0LjMgMjIuMi0zLjEgMi4yLTYuNyAzLjUtMTAuNyAzLjUtMTMuOCAwLTI1LTExLjItMjUtMjVzMTEuMi0yNSAyNS0yNWM4LjEgMCAxNS41IDMuOSAyMC4yIDEwLjIgMTEuNy0xNS4yIDE4LjgtMzQuMiAxOC44LTU1LjIgMC00NS45LTM3LjItODMuMS04My4xLTgzLjFzLTgzLjEgMzcuMi04My4xIDgzLjFjMCAxNi4zIDQuNyAzMS41IDEyLjggNDQuMy0xLjIgMS4xLTIuNiAyLjEtNC4xIDIuOS0xNC4zIDcuOC0yNiggMTQuOS0zNi4yIDIwLjJDMTA5LjMgMTIxLjUgNDcuNiA4OC4xIDQ3LjYgNjUuNnMxOC4xLTQwLjYgNDAuNi00MC42QzEwOS4zIDI1IDc3IDQzLjEgNzcgNjUuNnMzMi4zIDQwLjYgMzIuMyA0MC42UzE3MC4xIDI1IDQ3LjYgMjV6Ii8+PC9zdmc+" alt="heart">

    <audio id="audio-control" loop>
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>
    <script>
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || navigator.msMaxTouchPoints > 0;

        document.addEventListener('DOMContentLoaded', function () {
            const audio = document.getElementById('audio-control');

            function playAudio() {
                audio.volume = 0.8;
                audio.play().catch(error => {
                    console.log('Error al reproducir audio:', error);
                });
            }

            document.body.addEventListener(isTouchDevice ? 'touchstart' : 'click', function () {
                playAudio();
            });

            // JavaScript del temporizador
            const nowCostaRica = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Costa_Rica' }));
            // La cuenta regresiva terminará en 1 minuto desde ahora
            const targetDate = new Date('2025-10-09T00:00:00');

            const countdownElement = document.getElementById('countdown');
            const overlay = document.querySelector('.overlay');
            let countdownInterval;

            function updateCountdown() {
                const now = new Date();
                const currentCostaRicaTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/Costa_Rica' }));
                const difference = targetDate.getTime() - currentCostaRicaTime.getTime();

                // Si la cuenta regresiva ha terminado...
                if (difference <= 0) {
                    countdownElement.innerHTML = "¡El tiempo ha terminado! 🎉";

                    // Crea el botón
                    const newButton = document.createElement('a');
                    newButton.classList.add('action-button');
                    newButton.href = 'otro_archivo.html'; // <-- CAMBIA ESTO por el nombre de tu archivo
                    newButton.textContent = '¡Entra aquí!';
                    newButton.target = '_blank'; // Para abrir en una nueva pestaña (opcional)

                    // Agrega el botón si no existe ya
                    if (!document.querySelector('.action-button')) {
                        overlay.appendChild(newButton);
                    }

                    clearInterval(countdownInterval);
                    return;
                }

                // Si la cuenta regresiva sigue activa, actualiza el temporizador
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                countdownElement.innerHTML =
                    `${days} días, ${hours} horas, ${minutes} minutos, ${seconds} segundos`;
            }

            // Llama a la función cada segundo para actualizar la cuenta regresiva
            countdownInterval = setInterval(updateCountdown, 1000);

            // Llama a la función una vez al principio para evitar un retraso inicial
            updateCountdown();
        });

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        if (isTouchDevice) {
            cursor.style.display = 'none';
        } else {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = `${e.clientX - 16}px`;
                cursor.style.top = `${e.clientY - 16}px`;
                cursor.style.transform = `scale(${1 + Math.sin(Date.now() / 300) * 0.05})`;
            });

            document.addEventListener('mousedown', () => {
                cursor.style.transform = 'scale(0.8)';
            });

            document.addEventListener('mouseup', () => {
                cursor.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    cursor.style.transform = 'scale(1)';
                }, 100);
            });
        }

        const text = "LOVE YOU";
        const baseFontSize = isTouchDevice ? 24 : 42;
        const columns = Math.floor(canvas.width / (baseFontSize * 2));
        const drops = new Array(columns).fill(1);

        ctx.font = `bold ${baseFontSize}px monospace`;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff69b4"; /* Rosa brillante */
            for (let i = 0; i < drops.length; i++) {
                const x = i * baseFontSize * 2;
                const y = drops[i] * baseFontSize;

                ctx.shadowColor = "rgba(255, 105, 180, 0.7)";
                ctx.shadowBlur = 10;
                ctx.fillText(text, x, y);

                ctx.shadowBlur = 0;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.lineWidth = 2;
                ctx.strokeText(text, x, y);
                ctx.fillText(text, x, y);

                if (y > canvas.height && Math.random() > 0.992) {
                    drops[i] = 0;
                }
                drops[i] += 0.3;
            }
        }

        let particles = [];
        const handleInteraction = (e) => {
            const x = isTouchDevice ? e.touches[0].clientX : e.clientX;
            const y = isTouchDevice ? e.touches[0].clientY : e.clientY;

            const directions = [
                { x: 0, y: -1 },
                { x: 0, y: 1 },
                { x: -1, y: 0 },
                { x: 1, y: 0 }
            ];

            directions.forEach(dir => {
                particles.push({
                    x: x,
                    y: y,
                    vx: dir.x * (3 + Math.random() * 2),
                    vy: dir.y * (3 + Math.random() * 2),
                    alpha: 1,
                    size: baseFontSize + Math.random() * 30,
                    color: `#${Math.random() > 0.5 ? 'ff69b4' : 'ff007f'}` /* Alterna entre rosas */
                });
            });

            for (let i = 0; i < 16; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    alpha: 1,
                    size: baseFontSize + Math.random() * 20,
                    color: `#${Math.random() > 0.5 ? 'ff69b4' : 'ff007f'}` /* Alterna entre rosas */
                });
            }
        };

        canvas.addEventListener(isTouchDevice ? 'touchstart' : 'click', handleInteraction);

        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.globalAlpha = p.alpha;
                ctx.font = `bold ${p.size}px monospace`;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 15;
                ctx.fillText("LOVE YOU", p.x, p.y);
                ctx.shadowBlur = 0;
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.005;
                if (p.alpha <= 0) {
                    particles.splice(index, 1);
                }
            });
            ctx.globalAlpha = 1;
        }

        function animate() {
            drawMatrix();
            drawParticles();
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const columns = Math.floor(canvas.width / (baseFontSize * 2));
            drops.length = columns;
            drops.fill(1);
        });
    </script>
</body>
</html>
